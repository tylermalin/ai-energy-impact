# data/system-cards.yaml
#
# Manual entries for vendor-published system cards. The system-cards
# ingestion adapter reads this file on every run.
#
# Schema per entry:
#   modelName:           string, required
#   vendor:              string, required (OpenAI / Anthropic / Google / Meta / xAI / etc.)
#   category:            text | image | video | code
#   systemCardUrl:       absolute URL to the published card
#   publishedDate:       YYYY-MM-DD (when the card was published)
#   reportedEnergyWh:    number | null   (set if the card publishes a per-inference Wh figure)
#   derivationMethod:    string | null   ("pricing+throughput", "vendor-disclosed", etc.)
#   hardwareAssumption:  string | null   ("H200", "TPU v5", "Unknown")
#   parameters:          string | null   ("MoE-680B", "405B", "Unknown")
#   notes:               string | null   (free-form context)
#
# Defaults applied by the adapter:
#   - if reportedEnergyWh is set:  classification = "estimated", confidence = "medium-low"
#   - if reportedEnergyWh is null: classification = "derived",   confidence = "low"
#
# Add new entries by appending to the list. The adapter dedupes on
# (modelName, category, sourceName="Vendor system card", publishedDate).

